
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Decision Simulator | Cognitive Engine</title>
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Feather Icons for premium UI -->
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --bg-color: #0b0f19;
            --surface: rgba(30, 41, 59, 0.4);
            --surface-hover: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(56, 189, 248, 0.3);
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --risk-low: #10b981;
            --risk-low-bg: rgba(16, 185, 129, 0.15);
            --risk-medium: #f59e0b;
            --risk-medium-bg: rgba(245, 158, 11, 0.15);
            --risk-high: #ef4444;
            --risk-high-bg: rgba(239, 68, 68, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Header Styling */
        header {
            text-align: center;
            margin-bottom: 20px;
            animation: slideDown 0.6s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Input Section - Glassmorphism */
        .input-glass {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.8s ease-out;
            transition: border-color 0.3s ease;
        }

        .input-glass:focus-within {
            border-color: var(--border-highlight);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 20px var(--primary-glow);
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1.1rem;
            resize: vertical;
            min-height: 100px;
            outline: none;
        }

        textarea::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .status-text {
            color: var(--text-muted);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 24px;
        }

        button {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px var(--primary-glow);
            background: #fff;
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Results Section */
        #output {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: transform 0.3s ease, border-color 0.3s ease;
            animation: slideUp 0.5s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            background: var(--surface-hover);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 16px;
        }

        .card h3 {
            font-size: 1.3rem;
            color: #fff;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .badge.low { color: var(--risk-low); background: var(--risk-low-bg); border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge.medium { color: var(--risk-medium); background: var(--risk-medium-bg); border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge.high { color: var(--risk-high); background: var(--risk-high-bg); border: 1px solid rgba(239, 68, 68, 0.3); }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .stat-box h4 {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-box ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .stat-box ul li {
            position: relative;
            padding-left: 16px;
            font-size: 0.95rem;
            color: #e2e8f0;
            margin-bottom: 4px;
        }

        .stat-box.pros ul li::before { content: "✓"; position: absolute; left: 0; color: var(--risk-low); }
        .stat-box.cons ul li::before { content: "×"; position: absolute; left: 0; color: var(--risk-high); font-weight: bold; }

        .outcome {
            background: rgba(56, 189, 248, 0.05);
            border-left: 4px solid var(--primary);
            padding: 16px;
            border-radius: 0 12px 12px 0;
            font-size: 1rem;
            color: #e2e8f0;
        }

        /* Final Recommendation Card */
        .final {
            background: linear-gradient(145deg, rgba(56, 189, 248, 0.15), rgba(139, 92, 246, 0.15));
            border: 1px solid var(--border-highlight);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: scaleIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.2s;
            opacity: 0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .final::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .final h2 {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .final p.suggestion {
            font-size: 1.2rem;
            color: #f8fafc;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .final .confidence {
            display: inline-block;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        /* Loaders & Animations */
        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .pulsing-text {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .error-state {
            color: var(--risk-high);
            background: var(--risk-high-bg);
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        @media (max-width: 600px) {
    .stat-grid {
        grid-template-columns: 1fr;
    }

    h1 {
        font-size: 1.8rem;
    }
}
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1><i data-feather="compass"></i> Decision Engine</h1>
            <p class="subtitle">Simulate outcomes using advanced cognitive modeling</p>
        </header>

        <div class="input-glass">
            <textarea id="input" placeholder="Describe your dilemma... e.g., Should I bootstrap my startup or seek venture capital funding?"></textarea>
            
            <div class="action-row">
                <div id="status" class="status-text">
                    <i data-feather="info" style="width: 16px;"></i> Ready for analysis
                </div>
                <button id="generate-btn" onclick="generate()">
                    <span>Simulate</span>
                    <i data-feather="zap" style="width: 18px;"></i>
                </button>
            </div>
        </div>

        <div id="output">
    <div class="card" style="text-align:center; opacity:0.7;">
        <h3>🧭 Ready to analyze your decision</h3>
        <p>Enter a dilemma above and click <b>Simulate</b></p>
    </div>
</div>
    </div>

    <script>
        // Initialize feather icons
        feather.replace();

        async function generate() {
            const inputEl = document.getElementById("input");
            const statusEl = document.getElementById("status");
            const outputEl = document.getElementById("output");
            const btnEl = document.getElementById("generate-btn");
            const input = inputEl.value;

            // Input validation
            if (!input.trim()) {
                inputEl.focus();
                statusEl.innerHTML = `
                    <div class="error-state" style="padding: 4px 10px; background: transparent; border: none;">
                        <i data-feather="alert-circle" style="width:16px;"></i> Please enter a decision
                    </div>`;
                feather.replace();
                return;
            }

            // High-end loading state
            btnEl.disabled = true;
            btnEl.innerHTML = `<i data-feather="loader" class="spinner"></i> Processing`;
            statusEl.innerHTML = `<span class="pulsing-text" style="color: var(--primary); display:flex; align-items:center; gap:8px;"><i data-feather="cpu" style="width:16px;"></i> Synthesizing variables...</span>`;
            outputEl.innerHTML = "";
            feather.replace();

            try {
                const res = await fetch("http://127.0.0.1:8000/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ input })
                });

                if (!res.ok) throw new Error("Server error");

                const data = await res.json();

                if (data.error) {
                    throw new Error("Invalid response format from AI");
                }

                // Success State
                statusEl.innerHTML = `<span style="color: var(--risk-low); display:flex; align-items:center; gap:8px;"><i data-feather="check-circle" style="width:16px;"></i> Analysis complete</span>`;
                btnEl.disabled = false;
                btnEl.innerHTML = `<span>Simulate Again</span><i data-feather="refresh-cw" style="width: 16px;"></i>`;
                
                let html = "";

                // Render Options dynamically based on JSON
                if (data.options && Array.isArray(data.options)) {
                    data.options.forEach((opt, index) => {
                        const riskClass = opt.risk_level ? opt.risk_level.toLowerCase() : 'medium';
                        const riskIcon = riskClass === 'low' ? 'shield' : riskClass === 'medium' ? 'alert-triangle' : 'zap';
                        
                        // Handle potential array mapping gracefully
                        const prosList = (opt.pros || []).map(p => `<li>${p}</li>`).join("");
                        const consList = (opt.cons || []).map(c => `<li>${c}</li>`).join("");

                        html += `
                        <div class="card" style="animation-delay: ${index * 0.15}s">
                            <div class="card-header">
                                <h3><i data-feather="git-branch"></i> ${opt.option}</h3>
                                <span class="badge ${riskClass}">
                                    <i data-feather="${riskIcon}" style="width:14px;"></i> 
                                    Risk: ${opt.risk_level}
                                </span>
                            </div>

                            <div class="stat-grid">
                                <div class="stat-box pros">
                                    <h4><i data-feather="trending-up" style="width:14px;"></i> Potential Upsides</h4>
                                    <ul>${prosList || "<li>Not specified</li>"}</ul>
                                </div>
                                <div class="stat-box cons">
                                    <h4><i data-feather="trending-down" style="width:14px;"></i> Potential Downsides</h4>
                                    <ul>${consList || "<li>Not specified</li>"}</ul>
                                </div>
                            </div>

                            <div class="outcome">
                                <strong>Expected Outcome:</strong> ${opt.outcome} <br>
                                <span style="font-size: 0.9em; color: var(--text-muted); margin-top: 5px; display: block;">
                                    Success Probability: ${opt.success_probability}
                                </span>
                            </div>
                        </div>
                        `;
                    });
                }

                // Render Final Suggestion dynamically
                if (data.final_suggestion) {
                    html += `
                    <div class="final">
                        <h2><i data-feather="award"></i> AI Recommendation</h2>
                        <p class="suggestion">${data.final_suggestion}</p>
                        <div class="confidence">
                            <i data-feather="bar-chart-2" style="width:16px; vertical-align: middle; margin-right: 4px;"></i> 
                            Confidence Level: ${data.confidence || 'High'}
                        </div>
                    </div>
                    `;
                }

                setTimeout(() => {
    outputEl.innerHTML = html;
}, 300);
                feather.replace(); // Refresh newly added icons

            } catch (err) {
                console.error(err);
                statusEl.innerHTML = `
                    <div class="error-state">
                        <i data-feather="alert-octagon" style="width:16px;"></i> Connection to Cognitive Engine failed
                    </div>`;
                btnEl.disabled = false;
                btnEl.innerHTML = `<span>Retry</span><i data-feather="refresh-ccw" style="width: 18px;"></i>`;
                feather.replace();
            }
        }
    </script>
</body>
</html>
